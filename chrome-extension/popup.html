<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #0d0d0d;
      color: #fff;
    }
    h3 {
      margin-top: 0;
      font-size: 16px;
      color: #fff;
    }
    p {
      font-size: 13px;
      color: #a1a1aa;
      margin-bottom: 16px;
    }
    button {
      width: 100%;
      background-color: #c29b57;
      color: #000;
      border: none;
      padding: 10px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover {
      opacity: 0.9;
    }
    button:disabled {
      background-color: #333;
      color: #666;
      cursor: not-allowed;
    }
    #status {
      margin-top: 12px;
      font-size: 12px;
      text-align: center;
      color: #10b981;
    }
    .error {
      color: #ef4444 !important;
    }
    input {
      width: 100%;
      padding: 8px;
      margin-bottom: 12px;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #fff;
      border-radius: 4px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <h3>Ghosting Ads</h3>
  <p>Abra a Biblioteca de Anúncios do Facebook, filtre o que deseja e clique no botão abaixo para puxar as 3 primeiras ofertas.</p>
  
  <label style="font-size: 11px; color: #888; display: block; margin-bottom: 4px;">Domínio do seu site (Ex: https://ghostingads.site)</label>
  <input type="text" id="apiUrl" value="https://ghostingads.site" />

  <button id="extractBtn">Extrair 3 Anúncios</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
